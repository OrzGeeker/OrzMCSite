<script>
(function(){
  var d=document.documentElement;
  var key='theme';
  var preferred=function(){
    return 'dark';
  };
  var saved;
  try{ saved=localStorage.getItem(key); }catch(_){}
  d.setAttribute('data-theme',saved||preferred());
})();
document.addEventListener('DOMContentLoaded',function(){
  var applyTheme=function(theme){
    document.documentElement.setAttribute('data-theme',theme);
    var btn=document.getElementById('theme-toggle');
    if(btn){
      var label=btn.querySelector('.theme-toggle__label');
      if(label){
        label.textContent=theme==='dark'?'白天':'夜间';
      }else{
        btn.textContent=theme==='dark'?'白天':'夜间';
      }
      btn.setAttribute('aria-label',theme==='dark'?'切换到白天模式':'切换到夜间模式');
      btn.setAttribute('aria-pressed',theme==='dark'?'true':'false');
    }
  };
  var stored;
  try{ stored=localStorage.getItem('theme'); }catch(_){}
  if(stored){ applyTheme(stored); }
  else{
    applyTheme(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
  }
  var toggle=document.getElementById('theme-toggle');
  if(toggle){
    toggle.addEventListener('click',function(){
      var current=document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light';
      var next=current==='dark'?'light':'dark';
      applyTheme(next);
      try{ localStorage.setItem('theme',next); }catch(_){}
    });
  }
  var links=document.querySelectorAll('.anchor-link');
  links.forEach(function(a){
    a.addEventListener('click',function(e){
      e.preventDefault();
      var hash=a.getAttribute('href')||'';
      var url=location.origin+location.pathname+location.search+hash;
      try{ history.replaceState(null,'',url); }catch(_){}
      var revert=function(){ try{ a.setAttribute('data-tooltip','点击复制链接'); }catch(_){} };
      var copied=function(){ try{ a.setAttribute('data-tooltip','已复制'); setTimeout(revert,1500); }catch(_){} };
      if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(copied).catch(revert); }
      else{
        try{
          var i=document.createElement('input');
          i.style.position='fixed';
          i.style.opacity='0';
          i.value=url;
          document.body.appendChild(i);
          i.select();
          document.execCommand('copy');
          document.body.removeChild(i);
          copied();
        }catch(_){ revert(); }
      }
    });
  });
});
</script>
